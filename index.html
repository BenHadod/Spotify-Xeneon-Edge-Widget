<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Edge Login</title>

<style>
body{
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    text-align:center;
    max-width:400px;
}

button{
    background:#1DB954;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>

</head>

<body>

<div class="container">
    <h1>Spotify Edge</h1>
    <p>Verbinde dein Spotify-Konto mit dem Widget.</p>

```
<button onclick="loginSpotify()">
    Mit Spotify verbinden
</button>
```

</div>

<script>

const CLIENT_ID = "2a4553027ec2498d92d38493b0fe7209";
const REDIRECT_URI = "https://benhadod.github.io/Spotify-Xeneon-Edge-Widget/";

const SCOPES = [
  "user-read-playback-state",
  "user-modify-playback-state",
  "user-read-currently-playing"
].join(" ");

async function loginSpotify(){

    const verifier = generateRandomString(128);

    localStorage.setItem(
        "spotify_pkce_verifier",
        verifier
    );

    const challenge = await generateCodeChallenge(
        verifier
    );

    const authUrl =
        "https://accounts.spotify.com/authorize" +
        "?client_id=" + CLIENT_ID +
        "&response_type=code" +
        "&redirect_uri=" +
        encodeURIComponent(REDIRECT_URI) +
        "&code_challenge_method=S256" +
        "&code_challenge=" + challenge +
        "&scope=" +
        encodeURIComponent(SCOPES);

    window.location.href = authUrl;
}

function generateRandomString(length){
    const chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    let result = "";

    for(let i=0;i<length;i++){
        result += chars.charAt(
            Math.floor(Math.random()*chars.length)
        );
    }

    return result;
}

async function generateCodeChallenge(verifier){

    const data =
        new TextEncoder().encode(verifier);

    const digest =
        await crypto.subtle.digest(
            "SHA-256",
            data
        );

    return btoa(
        String.fromCharCode(...new Uint8Array(digest))
    )
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

</script>

</body>
</html>
